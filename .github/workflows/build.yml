name: Build Apple Unity Plugins

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install node
          pip3 install --break-system-packages requests

      - name: Build plugins
        run: echo "Y" | python3 build.py -b build pack -bc Release -m iOS macOS -p all 2>&1

      - name: Check what was built
        run: |
          echo "=== Build folder ==="
          ls -la Build/ || echo "Build folder does not exist"
          find . -name "*.tgz" 2>/dev/null || echo "No .tgz files found"

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: built-plugins
          path: Build/