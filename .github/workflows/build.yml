name: Build Apple Unity Plugins

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Install dependencies
        run: |
          brew install node

      - name: Patch script to skip prompts
        run: |
          sed -i '' 's/user_response = input()/user_response = "Y"/g' scripts/python/upi_utility.py

      - name: Build all plugins
        run: python3 build.py -f -b build pack -bc Release -m iOS macOS -p all -nc 2>&1

      - name: Check what was built
        run: |
          ls -la Build/ || echo "Build folder does not exist"

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: built-plugins-all
          path: Build/