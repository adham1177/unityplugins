name: Build Apple Unity Plugins

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install node
          pip3 install --break-system-packages requests

      - name: Patch script to skip prompts
        run: |
          sed -i '' 's/user_response = input()/user_response = "Y"/g' scripts/python/upi_utility.py

      - name: Build GameKit only
        run: python3 build.py -f -b build pack -bc Release -m iOS macOS -p Core GameKit -nc 2>&1

      - name: Check what was built
        run: |
          ls -la Build/ || echo "Build folder does not exist"
          find . -name "*.tgz" 2>/dev/null || echo "No .tgz files found"

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: built-gamekit
          path: Build/